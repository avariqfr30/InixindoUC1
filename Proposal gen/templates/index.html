<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Proposal System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #334155; }
        .card { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 680px; max-height: 90vh; overflow-y: auto; border: 1px solid #e2e8f0; }
        .hidden { display: none !important; }
        h2 { color: #0f172a; margin: 0 0 5px 0; font-size: 1.6rem; }
        p.sub { color: #64748b; margin: 0 0 20px 0; font-size: 0.95rem; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; color: #475569;}
        select, input[type="text"], textarea, button { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 0.95rem; box-sizing: border-box; }
        select:focus, input[type="text"]:focus, textarea:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        button { background: #2563eb; color: white; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        button.secondary { background: white; color: #475569; border: 1px solid #cbd5e1; }
        button.secondary:hover { background: #f1f5f9; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .checkbox-group { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .checkbox-group label { display: flex; align-items: center; font-weight: 400; margin: 0; font-size: 0.9rem; cursor: pointer; }
        .checkbox-group input[type="checkbox"] { width: auto; margin-right: 6px; margin-bottom: 0; }
        
        .finance-panel { background: #f1f5f9; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .finance-tier { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #cbd5e1; cursor: pointer; transition: 0.2s; }
        .finance-tier:hover { background: #e2e8f0; }
        .finance-tier:last-child { border-bottom: none; }
        
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; display: none; vertical-align: middle; margin-left: 8px; }
        .spinner.active { display: inline-block; }
        textarea { resize: vertical; min-height: 60px; margin-bottom: 10px; }

        .preview-panel { background: #f8fafc; border: 1px solid #dbeafe; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .preview-item { border-bottom: 1px dashed #cbd5e1; padding: 8px 0; }
        .preview-item:last-child { border-bottom: none; }
        .preview-item h4 { margin: 0 0 4px 0; font-size: 0.95rem; color: #0f172a; }
        .preview-item p { margin: 0; font-size: 0.85rem; color: #475569; }
        .preview-item ul { margin: 6px 0 0 16px; padding: 0; font-size: 0.82rem; color: #64748b; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div id="loader" style="text-align:center; padding: 40px;">
            <div style="border:3px solid #e2e8f0; border-top:3px solid #3b82f6; border-radius:50%; width:30px; height:30px; animation: spin 1s linear infinite; margin: 0 auto 15px auto;"></div>
            <p id="loader-text">Memuat Sistem...</p>
        </div>

        <div id="step-config" class="hidden">
            <h2>Proposal Generator</h2>
            <p class="sub">Engine Requirement & Discovery</p>
            
            <label for="select-perusahaan">Nama Perusahaan Klien</label>
            <select id="select-perusahaan"></select>
            
            <div id="container-dynamic" class="hidden">
                <div class="grid-2">
                    <div>
                        <label for="select-proposal">Jenis Proposal</label>
                        <select id="select-proposal">
                            <option value="" disabled selected>Pilih...</option>
                            <option value="Training">Training</option>
                            <option value="Konsultan">Konsultan</option>
                            <option value="Training dan Konsultan">Training dan Konsultan</option>
                        </select>
                    </div>
                    <div>
                        <label for="select-proyek">Jenis Proyek</label>
                        <select id="select-proyek">
                            <option value="" disabled selected>Pilih...</option>
                            <option value="Diagnostic">Diagnostic</option>
                            <option value="Strategic">Strategic</option>
                            <option value="Transformation">Transformation</option>
                            <option value="Implementation">Implementation</option>
                        </select>
                    </div>
                </div>

                <label for="input-konteks">Tujuan Objektif Proyek</label>
                <textarea id="input-konteks" placeholder="Singkat dan padat..."></textarea>

                <label for="input-permasalahan">Permasalahan Utama (Pain Points)</label>
                <textarea id="input-permasalahan" placeholder="Sebutkan root cause..."></textarea>

                <label>Pendekatan / Kebutuhan (Bisa pilih lebih dari satu)</label>
                <div class="checkbox-group" id="group-kebutuhan">
                    <label><input type="checkbox" value="Problem"> Problem</label>
                    <label><input type="checkbox" value="Opportunity"> Opportunity</label>
                    <label><input type="checkbox" value="Directive"> Directive</label>
                </div>

                <div class="grid-2">
                    <div>
                        <label for="input-waktu">Durasi Proyek</label>
                        <input type="text" id="input-waktu" placeholder="Contoh: 3 Bulan" />
                    </div>
                    <div>
                        <label for="input-biaya">Estimasi Anggaran</label>
                        <input type="text" id="input-biaya" placeholder="Masukkan harga atau pilih di bawah..." />
                    </div>
                </div>

                <div class="finance-panel">
                    <button type="button" id="btn-analyze" class="secondary" style="font-size: 0.85rem;">📊 Auto-Analisis Finansial & Opsi Harga</button>
                    <div id="finance-result" class="hidden" style="margin-top: 10px; font-size: 0.85rem;">
                        <p id="finance-summary" style="margin: 0 0 10px 0; font-style: italic; color: #475569;"></p>
                        <div id="finance-options"></div>
                    </div>
                </div>

                <label>Potensi Framework (Bisa pilih lebih dari satu)</label>
                <div class="checkbox-group" id="group-framework">
                    <label><input type="checkbox" value="Itil"> Itil</label>
                    <label><input type="checkbox" value="Togaf"> Togaf</label>
                    <label><input type="checkbox" value="Cobit"> Cobit</label>
                    <label><input type="checkbox" value="ISO"> ISO</label>
                    <label><input type="checkbox" value="Teori"> Teori</label>
                    <label><input type="checkbox" value="Regulasi"> Regulasi</label>
                    <label><input type="checkbox" value="Best Practise"> Best Practise</label>
                    <label><input type="checkbox" id="cb-lainnya" value="Lainnya"> Lainnya..</label>
                </div>
                <input type="text" id="input-framework-lainnya" class="hidden" placeholder="Ketik framework manual..." />
            </div>

            <button type="button" id="btn-preview" class="secondary">👁️ Preview Struktur Proposal</button>
            <div id="preview-panel" class="preview-panel hidden">
                <p class="sub" style="margin-bottom:10px;">Pratinjau struktur konten berdasarkan input saat ini.</p>
                <div id="preview-content"></div>
            </div>
            
            <button type="button" id="btn-generate" disabled>Generate Proposal Singkat & Padat <span id="spinner" class="spinner"></span></button>
        </div>

        <div id="step-success" class="hidden" style="text-align:center; padding: 20px;">
            <div style="font-size: 50px; margin-bottom: 15px;">✅</div>
            <h2>Selesai!</h2>
            <p class="sub">Dokumen berhasil disusun menggunakan format ringkas.</p>
            <button type="button" onclick="location.reload()" class="secondary">Buat Baru</button>
        </div>
    </div>

    <script>
        const ui = {
            loader: document.getElementById('loader'),
            configStep: document.getElementById('step-config'),
            successStep: document.getElementById('step-success'),
            selPerusahaan: document.getElementById('select-perusahaan'),
            selProposal: document.getElementById('select-proposal'),
            selProyek: document.getElementById('select-proyek'),
            inpKonteks: document.getElementById('input-konteks'),
            inpPermasalahan: document.getElementById('input-permasalahan'),
            inpWaktu: document.getElementById('input-waktu'),
            inpBiaya: document.getElementById('input-biaya'),
            groupKebutuhan: document.getElementById('group-kebutuhan'),
            groupFramework: document.getElementById('group-framework'),
            cbLainnya: document.getElementById('cb-lainnya'),
            inpFrameworkLainnya: document.getElementById('input-framework-lainnya'),
            containerDynamic: document.getElementById('container-dynamic'),
            btnGenerate: document.getElementById('btn-generate'),
            btnAnalyze: document.getElementById('btn-analyze'),
            btnPreview: document.getElementById('btn-preview'),
            previewPanel: document.getElementById('preview-panel'),
            previewContent: document.getElementById('preview-content'),
            financeResult: document.getElementById('finance-result'),
            financeSummary: document.getElementById('finance-summary'),
            financeOptions: document.getElementById('finance-options'),
            spinner: document.getElementById('spinner')
        };

        // UI Logic for the "Lainnya" Checkbox
        ui.cbLainnya.addEventListener('change', (e) => {
            if (e.target.checked) {
                ui.inpFrameworkLainnya.classList.remove('hidden');
                ui.inpFrameworkLainnya.focus();
            } else {
                ui.inpFrameworkLainnya.classList.add('hidden');
                ui.inpFrameworkLainnya.value = ''; 
            }
            checkReady();
        });

        // Helper to grab selected frameworks including the custom input
        const getFinalFrameworks = () => {
            const checked = Array.from(ui.groupFramework.querySelectorAll('input:checked:not(#cb-lainnya)'))
                                 .map(cb => cb.value);
            if (ui.cbLainnya.checked && ui.inpFrameworkLainnya.value.trim() !== '') {
                checked.push(ui.inpFrameworkLainnya.value.trim());
            }
            return checked.join(', ');
        };

        const getChecked = (container) => Array.from(container.querySelectorAll('input:checked')).map(cb => cb.value).join(', ');

        const checkReady = () => {
            const hasKebutuhan = ui.groupKebutuhan.querySelectorAll('input:checked').length > 0;
            const hasFramework = getFinalFrameworks().length > 0;

            const isReady = ui.selPerusahaan.value && ui.selProposal.value && ui.selProyek.value &&
                            ui.inpKonteks.value.trim() && ui.inpPermasalahan.value.trim() && 
                            ui.inpBiaya.value.trim() && ui.inpWaktu.value.trim() &&
                            hasKebutuhan && hasFramework;
                            
            ui.btnGenerate.disabled = !isReady;
        };

        async function init() {
            try {
                const res = await fetch('/api/companies');
                const data = await res.json();
                ui.selPerusahaan.innerHTML = `<option value="" disabled selected>Pilih Klien...</option>`;
                data.forEach(d => ui.selPerusahaan.add(new Option(d, d)));
                ui.loader.classList.add('hidden');
                ui.configStep.classList.remove('hidden');
            } catch (e) {
                document.getElementById('loader-text').innerText = "Gagal memuat database.";
            }
        }
        init();

        ui.selPerusahaan.addEventListener('change', () => {
            ui.containerDynamic.classList.remove('hidden');
            ui.financeResult.classList.add('hidden'); 
            checkReady();
        });

        // Event Listeners for Validation
        ['change', 'input'].forEach(evt => {
            [ui.selProposal, ui.selProyek, ui.inpKonteks, ui.inpPermasalahan, ui.inpWaktu, ui.inpBiaya, ui.groupKebutuhan, ui.groupFramework, ui.inpFrameworkLainnya].forEach(el => {
                if(el) el.addEventListener(evt, checkReady);
            });
        });

        // Smart Pricing Logic
        ui.btnAnalyze.addEventListener('click', async () => {
            const client = ui.selPerusahaan.value;
            if(!client) return alert("Pilih klien terlebih dahulu.");
            
            ui.btnAnalyze.innerText = "Menganalisis OSINT...";
            ui.btnAnalyze.disabled = true;

            try {
                const res = await fetch('/api/suggest-budget', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nama_perusahaan: client })
                });
                const data = await res.json();
                
                ui.financeSummary.innerText = data.analysis;
                ui.financeOptions.innerHTML = data.options.map(opt => `
                    <div class="finance-tier" onclick="document.getElementById('input-biaya').value='${opt.price}'; document.getElementById('input-biaya').dispatchEvent(new Event('input'));">
                        <strong>${opt.tier}</strong>
                        <span>${opt.price}</span>
                    </div>
                `).join('');
                
                ui.financeResult.classList.remove('hidden');
            } catch (err) {
                alert("Gagal menganalisa data finansial.");
            } finally {
                ui.btnAnalyze.innerText = "📊 Auto-Analisis Finansial & Opsi Harga";
                ui.btnAnalyze.disabled = false;
            }
        });

        const getPayload = () => ({
            nama_perusahaan: ui.selPerusahaan.value,
            jenis_proposal: ui.selProposal.value,
            jenis_proyek: ui.selProyek.value,
            konteks_organisasi: ui.inpKonteks.value,
            permasalahan: ui.inpPermasalahan.value,
            klasifikasi_kebutuhan: getChecked(ui.groupKebutuhan),
            estimasi_waktu: ui.inpWaktu.value,
            estimasi_biaya: ui.inpBiaya.value,
            potensi_framework: getFinalFrameworks()
        });

        ui.btnPreview.addEventListener('click', async () => {
            const payload = getPayload();
            if (!payload.nama_perusahaan || !payload.konteks_organisasi || !payload.permasalahan) {
                return alert('Lengkapi minimal nama klien, tujuan proyek, dan permasalahan sebelum preview.');
            }
            ui.btnPreview.disabled = true;
            ui.btnPreview.innerText = 'Menyusun Preview...';
            try {
                const res = await fetch('/api/preview-outline', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                ui.previewContent.innerHTML = data.outline.map(ch => `
                    <div class="preview-item">
                        <h4>${ch.title}</h4>
                        <p>${ch.preview}</p>
                        <ul>${ch.subsections.map(s => `<li>${s}</li>`).join('')}</ul>
                    </div>
                `).join('');
                ui.previewPanel.classList.remove('hidden');
            } catch (e) {
                alert('Gagal memuat preview struktur proposal.');
            } finally {
                ui.btnPreview.disabled = false;
                ui.btnPreview.innerText = '👁️ Preview Struktur Proposal';
            }
        });

        ui.btnGenerate.addEventListener('click', async () => {
            ui.btnGenerate.disabled = true;
            ui.spinner.classList.add('active');

            const payload = getPayload();

            try {
                const res = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error();
                
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Proposal_Ringkas_${payload.nama_perusahaan.replace(/\s+/g, '_')}.docx`;
                a.click();
                
                ui.configStep.classList.add('hidden');
                ui.successStep.classList.remove('hidden');
            } catch (e) {
                alert("Gagal generate dokumen. Periksa console/log server.");
                ui.btnGenerate.disabled = false;
                ui.spinner.classList.remove('active');
            }
        });
    </script>
</body>
</html>
