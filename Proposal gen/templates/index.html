<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Generator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px; 
        }
        h1 { color: #003366; }
        .form-container { 
            background: #fff; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 8px; 
            color: #555; 
        }
        select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 16px; 
            background-color: #fafafa; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #003366; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px; 
            cursor: pointer; 
            transition: background 0.3s; 
            margin-top: 10px;
        }
        button:hover:not(:disabled) { background-color: #002244; }
        button:disabled { background-color: #999; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>Proposal Generator</h1>
    <div class="form-container">
        <form onsubmit="generateProposal(event)">
            
            <div class="form-group">
                <label id="label-entity" for="entity">Client Entity</label>
                <select id="entity" onchange="updateTopics()" required>
                    <option value="" disabled selected>Loading data...</option>
                </select>
            </div>

            <div class="form-group">
                <label id="label-topic" for="topic">Strategic Initiative</label>
                <select id="topic" onchange="updateBudgets()" disabled required>
                    <option value="" disabled selected>Select an entity first...</option>
                </select>
            </div>

            <div class="form-group">
                <label id="label-budget" for="budget">Investment Estimation</label>
                <select id="budget" disabled required>
                    <option value="" disabled selected>Select a topic first...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="service_type">Service Type</label>
                <select id="service_type" required>
                    <option value="Consulting" selected>Consulting Engagement</option>
                    <option value="Training">Training Program</option>
                </select>
            </div>

            <button type="submit" id="generate-btn">Generate Proposal</button>
        </form>
    </div>

    <script>
        let dbStructure = {};

        window.onload = async function() {
            try {
                const response = await fetch('/get-config');
                const data = await response.json();
                
                dbStructure = data.structure;
                
                document.getElementById('label-entity').innerText = data.labels[0];
                document.getElementById('label-topic').innerText = data.labels[1];
                document.getElementById('label-budget').innerText = data.labels[2];
                
                const entitySelect = document.getElementById('entity');
                entitySelect.innerHTML = '<option value="" disabled selected>Select an option...</option>'; 
                
                for (const entityName in dbStructure) {
                    let opt = document.createElement('option');
                    opt.value = entityName;
                    opt.innerHTML = entityName;
                    entitySelect.appendChild(opt);
                }
            } catch (error) {
                console.error("Error loading config:", error);
                document.getElementById('entity').innerHTML = '<option value="" disabled>Error loading data</option>';
            }
        };

        function updateTopics() {
            const entitySelect = document.getElementById('entity');
            const topicSelect = document.getElementById('topic');
            const budgetSelect = document.getElementById('budget');
            
            topicSelect.innerHTML = '<option value="" disabled selected>Select an option...</option>';
            budgetSelect.innerHTML = '<option value="" disabled selected>Select a topic first...</option>';
            budgetSelect.disabled = true;
            
            const selectedEntity = entitySelect.value;
            
            if (selectedEntity && dbStructure[selectedEntity]) {
                topicSelect.disabled = false;
                const topics = dbStructure[selectedEntity].topics;
                
                for (const topicName in topics) {
                    let opt = document.createElement('option');
                    opt.value = topicName;
                    opt.innerHTML = topicName;
                    topicSelect.appendChild(opt);
                }
            } else {
                topicSelect.disabled = true;
            }
        }

        function updateBudgets() {
            const entitySelect = document.getElementById('entity');
            const topicSelect = document.getElementById('topic');
            const budgetSelect = document.getElementById('budget');
            
            budgetSelect.innerHTML = '<option value="" disabled selected>Select an option...</option>';
            
            const selectedEntity = entitySelect.value;
            const selectedTopic = topicSelect.value;
            
            if (selectedEntity && selectedTopic && dbStructure[selectedEntity].topics[selectedTopic]) {
                budgetSelect.disabled = false;
                const budgets = dbStructure[selectedEntity].topics[selectedTopic].budgets;
                
                budgets.forEach(budgetVal => {
                    let opt = document.createElement('option');
                    opt.value = budgetVal;
                    opt.innerHTML = budgetVal;
                    budgetSelect.appendChild(opt);
                });
            } else {
                budgetSelect.disabled = true;
            }
        }

        async function generateProposal(event) {
            event.preventDefault();
            const btn = document.getElementById('generate-btn');
            const originalText = btn.innerText;
            
            const entity = document.getElementById('entity').value;
            const topic = document.getElementById('topic').value;
            const budget = document.getElementById('budget').value;
            const service_type = document.getElementById('service_type').value;
            
            if (!entity || !topic || !budget || !service_type) {
                alert("Please select all options before generating.");
                return;
            }
            
            // PAYLOAD UPDATED WITH SERVICE TYPE
            const payload = { entity, topic, budget, service_type };
            
            try {
                btn.innerText = "Generating... (This may take a minute)";
                btn.disabled = true;
                
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error("Generation failed");
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                
                const disposition = response.headers.get('Content-Disposition');
                let filename = "Proposal.docx";
                if (disposition && disposition.indexOf('attachment') !== -1) {
                    const matches = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/.exec(disposition);
                    if (matches != null && matches[1]) filename = matches[1].replace(/['"]/g, '');
                }
                
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
                
            } catch (error) {
                console.error("Error generating document:", error);
                alert("An error occurred while generating the proposal.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
