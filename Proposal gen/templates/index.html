<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Proposal System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #334155; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 680px; max-height: 95vh; overflow-y: auto;}
        .hidden { display: none; }
        h2 { color: #0f172a; margin: 0 0 10px 0; font-size: 1.8rem; }
        p.sub { color: #64748b; margin: 0 0 25px 0; font-size: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        select, input, textarea, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; background: white; box-sizing: border-box; font-family: 'Segoe UI', sans-serif;}
        select:focus, input:focus, textarea:focus { border-color: #3b82f6; outline: none; }
        button { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        button.secondary { background: white; color: #475569; border: 1px solid #cbd5e1; }
        button.secondary:hover { background: #f8fafc; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .review-box { background: #f8fafc; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0; font-size: 0.95rem; }
        .review-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 5px;}
        .review-row span:last-child { font-weight: 600; color: #0f172a; text-align: right; max-width: 60%; word-wrap: break-word;}
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; display: none; vertical-align: middle; margin-left: 10px; }
        .spinner.active { display: inline-block; }
        textarea { resize: vertical; min-height: 70px; margin-bottom: 10px; }
        
        /* Intelligent Autocomplete Styles */
        .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .chip { 
            background: #e2e8f0; 
            color: #475569; 
            padding: 6px 12px; 
            border-radius: 16px; 
            font-size: 0.85rem; 
            cursor: pointer; 
            transition: 0.2s; 
            border: 1px solid transparent;
            -webkit-user-select: none; 
            -moz-user-select: none;    
            -ms-user-select: none;     
            user-select: none;         
        }
        .chip:hover { background: #cbd5e1; color: #0f172a; border-color: #94a3b8; }
        .chip:active { transform: scale(0.95); }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div id="loader" style="text-align:center; padding: 40px;">
            <div style="border:4px solid #e2e8f0; border-top:4px solid #3b82f6; border-radius:50%; width:40px; height:40px; animation: spin 1s linear infinite; margin: 0 auto 20px auto;"></div>
            <p id="loader-text">Memuat Sistem &amp; Database...</p>
        </div>

        <div id="step-config" class="hidden">
            <h2>Inixindo Proposal Engine</h2>
            <p class="sub">Client Discovery &amp; Requirement Layer</p>
            
            <label id="label-entity" for="select-entity">Klien / Entitas</label>
            <select id="select-entity"></select>
            
            <div id="container-topic" class="hidden">
                <label id="label-topic" for="select-topic">Inisiatif Strategis</label>
                <select id="select-topic"></select>
            </div>

            <div id="container-budget" class="hidden">
                <label id="label-budget" for="select-budget">Estimasi Investasi</label>
                <select id="select-budget"></select>
            </div>

            <div id="container-service" class="hidden">
                <label id="label-service" for="select-service">Tipe Layanan</label>
                <select id="select-service">
                    <option value="" disabled selected>Pilih Layanan...</option>
                    <option value="Consulting">Consulting Engagement</option>
                    <option value="Training">Training Program</option>
                </select>
                
                <div id="container-discovery" class="hidden" style="margin-top: 10px; padding-top: 15px; border-top: 1px solid #e2e8f0;">
                    <h3 style="font-size:1.1rem; margin-top:0;">Parameter Proyek (Blueprint)</h3>
                    
                    <div class="grid-2">
                        <div>
                            <label for="select-goal">Tujuan Utama</label>
                            <select id="select-goal">
                                <option value="Compliance">Compliance (Kepatuhan)</option>
                                <option value="Improvement" selected>Improvement (Peningkatan)</option>
                                <option value="Transformation">Transformation (Transformasi)</option>
                            </select>
                        </div>
                        <div>
                            <label for="select-type">Jenis Proyek</label>
                            <select id="select-type">
                                <option value="Diagnostic">Diagnostic</option>
                                <option value="Strategic">Strategic</option>
                                <option value="Implementation" selected>Implementation</option>
                                <option value="Transformation">Transformation</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="grid-2">
                        <div>
                            <label for="input-timeline">Timeline yang Diinginkan</label>
                            <input type="text" id="input-timeline" list="timeline-options" placeholder="Cth: 3 Bulan, 6 Minggu..." />
                            <datalist id="timeline-options">
                                <option value="2 Minggu"></option>
                                <option value="4 Minggu"></option>
                                <option value="6 Minggu"></option>
                                <option value="2 Bulan"></option>
                                <option value="3 Bulan"></option>
                                <option value="6 Bulan"></option>
                                <option value="1 Tahun"></option>
                            </datalist>
                        </div>
                        <div>
                            <label for="input-regulations">Standar / Regulasi</label>
                            <input type="text" id="input-regulations" list="regulation-options" placeholder="Cth: ISO 27001, SPBE..." />
                            <datalist id="regulation-options">
                                <option value="Otomatis terisi dari AI..."></option>
                            </datalist>
                        </div>
                    </div>
            
                    <label for="input-notes">Pain Points &amp; Catatan Klien</label>
                    <textarea id="input-notes" placeholder="Deskripsikan masalah utama yang dibahas saat discovery meeting..."></textarea>
                    
                    <div class="suggestions" id="notes-suggestions"></div>
                </div>
            </div>
            
            <button type="button" id="btn-review" disabled>Lanjut Tinjau Data</button>
            <button type="button" id="btn-refresh" class="secondary" style="font-size:0.9rem; padding:10px;">🔄 Refresh Database</button>
        </div>

        <div id="step-review" class="hidden">
            <h2>Konfirmasi Detail</h2>
            <p class="sub">Validasi data Discovery sebelum menyusun proposal.</p>
            <div class="review-box" id="review-text"></div>
            <div style="display:flex; gap:15px;">
                <button type="button" id="btn-back" class="secondary" style="width:35%">Kembali</button>
                <button type="button" id="btn-generate" style="width:65%">Generate Proposal <span id="spinner" class="spinner"></span></button>
            </div>
        </div>

        <div id="step-success" class="hidden" style="text-align:center; padding: 20px;">
            <div style="font-size: 60px; margin-bottom: 20px;">✅</div>
            <h2>Selesai!</h2>
            <p class="sub">Dokumen telah berhasil disusun dan diunduh.</p>
            <button type="button" onclick="location.reload()" class="secondary">Buat Proposal Baru</button>
        </div>
    </div>

    <script>
        let databaseStructure = {}; 
        let smartLibrary = {}; 
        
        const ui = {
            loader: document.getElementById('loader'),
            loaderText: document.getElementById('loader-text'),
            configStep: document.getElementById('step-config'),
            reviewStep: document.getElementById('step-review'),
            successStep: document.getElementById('step-success'),
            
            selectEntity: document.getElementById('select-entity'),
            selectTopic: document.getElementById('select-topic'),
            selectBudget: document.getElementById('select-budget'),
            selectService: document.getElementById('select-service'),
            
            selectGoal: document.getElementById('select-goal'),
            selectType: document.getElementById('select-type'),
            inputTimeline: document.getElementById('input-timeline'),
            inputRegulations: document.getElementById('input-regulations'),
            inputNotes: document.getElementById('input-notes'),
            
            containerTopic: document.getElementById('container-topic'),
            containerBudget: document.getElementById('container-budget'),
            containerService: document.getElementById('container-service'),
            containerDiscovery: document.getElementById('container-discovery'),
            
            labelEntity: document.getElementById('label-entity'),
            labelTopic: document.getElementById('label-topic'),
            labelBudget: document.getElementById('label-budget'),
            reviewText: document.getElementById('review-text'),
            
            btnReview: document.getElementById('btn-review'),
            btnGenerate: document.getElementById('btn-generate'),
            btnRefresh: document.getElementById('btn-refresh'),
            btnBack: document.getElementById('btn-back'),
            spinner: document.getElementById('spinner')
        };
        
        function loadConfig() {
            fetch('/get-config')
                .then(response => {
                    if (!response.ok) throw new Error("Database Load Failed.");
                    return response.json();
                })
                .then(data => {
                    if (data.error) throw new Error(data.error);
                    
                    databaseStructure = data.structure; 
                    smartLibrary = data.suggestions; 
                    
                    ui.labelEntity.innerText = data.labels[0] || "Client Entity"; 
                    ui.labelTopic.innerText = data.labels[1] || "Strategic Initiative";
                    ui.labelBudget.innerText = data.labels[2] || "Investment Estimation";
                    
                    ui.selectEntity.innerHTML = '<option value="" disabled selected>Pilih Opsi...</option>';
                    Object.keys(databaseStructure).forEach(key => { 
                        let option = document.createElement('option'); 
                        option.value = key; option.text = key; 
                        ui.selectEntity.add(option); 
                    });
                    
                    ui.loader.classList.add('hidden'); 
                    ui.configStep.classList.remove('hidden');
                })
                .catch(err => {
                    ui.loaderText.innerHTML = `<span class="error-text">${err.message}</span>`;
                });
        }
        
        loadConfig();

        function updateIntelligentSuggestions() {
            const entityText = ui.selectEntity.value || "";
            const topicText = ui.selectTopic.value || "";
            const combinedContext = (entityText + " " + topicText).toLowerCase();

            let matchedRegs = new Set();
            let matchedPains = new Set();

            if(smartLibrary) {
                Object.values(smartLibrary).forEach(category => {
                    if (category.keywords && category.keywords.some(kw => combinedContext.includes(kw))) {
                        category.regulations.forEach(r => matchedRegs.add(r));
                        category.pain_points.forEach(p => matchedPains.add(p));
                    }
                });
            }

            if (matchedRegs.size === 0) {
                ["ISO 9001", "ISO 27001", "UU PDP"].forEach(r => matchedRegs.add(r));
                ["Proses operasional masih manual", "Kurangnya integrasi sistem", "Keterbatasan kapabilitas SDM", "Sulit mengambil keputusan berbasis data"].forEach(p => matchedPains.add(p));
            }

            const regDatalist = document.getElementById('regulation-options');
            regDatalist.innerHTML = '';
            matchedRegs.forEach(reg => {
                let opt = document.createElement('option');
                opt.value = reg;
                regDatalist.appendChild(opt);
            });

            const chipContainer = document.getElementById('notes-suggestions');
            chipContainer.innerHTML = '';
            matchedPains.forEach(pain => {
                let span = document.createElement('span');
                span.className = 'chip';
                span.innerText = '+ ' + pain;
                span.onclick = () => appendNote(pain);
                chipContainer.appendChild(span);
            });
        }

        function appendNote(text) {
            const textarea = ui.inputNotes;
            if (textarea.value.trim() !== "") {
                textarea.value += '\n- ' + text;
            } else {
                textarea.value = '- ' + text;
            }
            textarea.focus();
        }

        ui.btnRefresh.onclick = () => {
            ui.btnRefresh.innerText = "Refreshing..."; ui.btnRefresh.disabled = true;
            fetch('/refresh-knowledge', {method: 'POST'})
                .then(response => response.json())
                .then(res => { alert("Database Synced!"); location.reload(); })
                .catch(err => { ui.btnRefresh.innerText = "🔄 Refresh Database"; ui.btnRefresh.disabled = false; });
        };

        ui.selectEntity.onchange = () => { 
            ui.selectTopic.innerHTML = '<option value="" disabled selected>Pilih Opsi...</option>'; 
            ui.selectBudget.innerHTML = ''; 
            ui.selectService.value = ""; 
            ui.containerDiscovery.classList.add('hidden');
            
            if (ui.selectEntity.value && databaseStructure[ui.selectEntity.value]) {
                const topics = databaseStructure[ui.selectEntity.value].topics;
                Object.keys(topics).forEach(topic => { 
                    let option = document.createElement('option'); 
                    option.value = topic; option.text = topic; 
                    ui.selectTopic.add(option); 
                }); 
                ui.containerTopic.classList.remove('hidden'); 
                ui.containerBudget.classList.add('hidden');
                ui.containerService.classList.add('hidden');
                ui.btnReview.disabled = true; 
                updateIntelligentSuggestions(); 
            }
        };

        ui.selectTopic.onchange = () => {
            ui.selectBudget.innerHTML = '<option value="" disabled selected>Pilih Opsi...</option>';
            ui.selectService.value = ""; 
            ui.containerDiscovery.classList.add('hidden');
            
            if (ui.selectEntity.value && ui.selectTopic.value && databaseStructure[ui.selectEntity.value].topics[ui.selectTopic.value]) {
                const budgets = databaseStructure[ui.selectEntity.value].topics[ui.selectTopic.value].budgets;
                budgets.forEach(budget => {
                    let option = document.createElement('option'); 
                    option.value = budget; option.text = budget; 
                    ui.selectBudget.add(option);
                });
                ui.containerBudget.classList.remove('hidden');
                ui.containerService.classList.add('hidden');
                ui.btnReview.disabled = true;
                updateIntelligentSuggestions(); 
            }
        };

        ui.selectBudget.onchange = () => {
            ui.containerService.classList.remove('hidden');
            checkReviewReady();
        };

        ui.selectService.onchange = () => {
            ui.containerDiscovery.classList.remove('hidden');
            checkReviewReady();
        };

        ui.inputTimeline.oninput = checkReviewReady;

        function checkReviewReady() {
            if (ui.selectEntity.value && ui.selectTopic.value && ui.selectBudget.value && ui.selectService.value && ui.inputTimeline.value.trim()) {
                ui.btnReview.disabled = false;
            } else {
                ui.btnReview.disabled = true;
            }
        }
        
        ui.btnReview.onclick = () => { 
            let html = `
                <div class="review-row"><span>Klien</span><span>${ui.selectEntity.value}</span></div>
                <div class="review-row"><span>Inisiatif</span><span>${ui.selectTopic.value}</span></div>
                <div class="review-row"><span>Anggaran</span><span>${ui.selectBudget.value}</span></div>
                <div class="review-row"><span>Tipe Layanan</span><span>${ui.selectService.options[ui.selectService.selectedIndex].text}</span></div>
                <div class="review-row"><span>Tujuan &amp; Jenis</span><span>${ui.selectGoal.value} / ${ui.selectType.value}</span></div>
                <div class="review-row"><span>Timeline</span><span>${ui.inputTimeline.value}</span></div>
            `;
            
            if (ui.inputRegulations.value.trim()) html += `<div class="review-row"><span>Regulasi</span><span>${ui.inputRegulations.value}</span></div>`;
            if (ui.inputNotes.value.trim()) {
                let shortNotes = ui.inputNotes.value.length > 40 ? ui.inputNotes.value.substring(0, 40) + '...' : ui.inputNotes.value;
                html += `<div class="review-row"><span>Catatan Tambahan</span><span>${shortNotes}</span></div>`;
            }

            ui.reviewText.innerHTML = html; 
            ui.configStep.classList.add('hidden'); 
            ui.reviewStep.classList.remove('hidden'); 
        };
        
        ui.btnBack.onclick = () => { 
            ui.reviewStep.classList.add('hidden'); 
            ui.configStep.classList.remove('hidden'); 
        };
        
        ui.btnGenerate.onclick = () => {
            ui.btnGenerate.disabled = true; 
            ui.spinner.classList.add('active');
            
            const payload = {
                entity: ui.selectEntity.value,
                topic: ui.selectTopic.value,
                budget: ui.selectBudget.value,
                service_type: ui.selectService.value,
                project_goal: ui.selectGoal.value,
                project_type: ui.selectType.value,
                timeline: ui.inputTimeline.value,
                notes: ui.inputNotes.value,
                regulations: ui.inputRegulations.value
            };

            fetch('/generate', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(payload) 
            })
            .then(response => {
                if (!response.ok) throw new Error("Document generation failed.");
                return response.blob();
            })
            .then(blob => {
                let url = window.URL.createObjectURL(blob);
                let a = document.createElement('a'); 
                a.href = url; 
                const safeEntity = ui.selectEntity.value.replace(/\s+/g, '_');
                const safeTopic = ui.selectTopic.value.replace(/\s+/g, '_');
                a.download = `Proposal_${safeEntity}_${safeTopic}.docx`; 
                a.click();
                
                window.URL.revokeObjectURL(url);
                ui.reviewStep.classList.add('hidden'); 
                ui.successStep.classList.remove('hidden');
            })
            .catch(err => {
                alert("Failed to generate document. Check server logs.");
                ui.btnGenerate.disabled = false;
                ui.spinner.classList.remove('active');
            });
        };
    </script>
</body>
</html>
