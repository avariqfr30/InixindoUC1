<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Proposal System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #334155; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 680px; max-height: 95vh; overflow-y: auto;}
        .hidden { display: none; }
        h2 { color: #0f172a; margin: 0 0 10px 0; font-size: 1.8rem; }
        p.sub { color: #64748b; margin: 0 0 25px 0; font-size: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }
        select, input, textarea, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; background: white; box-sizing: border-box; font-family: 'Segoe UI', sans-serif;}
        select:focus, input:focus, textarea:focus { border-color: #3b82f6; outline: none; }
        button { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        button.secondary { background: white; color: #475569; border: 1px solid #cbd5e1; }
        button.secondary:hover { background: #f8fafc; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .review-box { background: #f8fafc; padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0; font-size: 0.95rem; }
        .review-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 5px;}
        .review-row span:last-child { font-weight: 600; color: #0f172a; text-align: right; max-width: 60%; word-wrap: break-word;}
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; display: none; vertical-align: middle; margin-left: 10px; }
        .spinner.active { display: inline-block; }
        textarea { resize: vertical; min-height: 70px; margin-bottom: 10px; }
        
        /* Intelligent Autocomplete Styles */
        .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .chip { 
            background: #e2e8f0; 
            color: #475569; 
            padding: 6px 12px; 
            border-radius: 16px; 
            font-size: 0.85rem; 
            cursor: pointer; 
            transition: 0.2s; 
            border: 1px solid transparent;
            -webkit-user-select: none; 
            -moz-user-select: none;    
            -ms-user-select: none;     
            user-select: none;         
        }
        .chip:hover { background: #cbd5e1; color: #0f172a; border-color: #94a3b8; }
        .chip:active { transform: scale(0.95); }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div id="loader" style="text-align:center; padding: 40px;">
            <div style="border:4px solid #e2e8f0; border-top:4px solid #3b82f6; border-radius:50%; width:40px; height:40px; animation: spin 1s linear infinite; margin: 0 auto 20px auto;"></div>
            <p id="loader-text">Memuat Sistem &amp; Database...</p>
        </div>

        <div id="step-config" class="hidden">
            <h2>Inixindo Proposal Engine</h2>
            <p class="sub">Requirement & Discovery Layer</p>
            
            <label for="select-perusahaan">Nama Perusahaan</label>
            <select id="select-perusahaan"></select>
            
            <div id="container-dynamic" class="hidden">
                <label for="select-proposal">Jenis Proposal</label>
                <select id="select-proposal">
                    <option value="" disabled selected>Pilih Jenis Proposal...</option>
                    <option value="Consulting">Consulting Engagement</option>
                    <option value="Training">Training Program</option>
                    <option value="Consulting dan Training">Consulting & Training Program</option>
                </select>

                <label for="select-konteks">Konteks Organisasi</label>
                <select id="select-konteks"></select>

                <label for="select-permasalahan">Permasalahan</label>
                <select id="select-permasalahan"></select>

                <label for="select-kebutuhan">Klasifikasi Kebutuhan</label>
                <select id="select-kebutuhan">
                    <option value="Diagnostic">Diagnostic</option>
                    <option value="Strategic">Strategic</option>
                    <option value="Implementation" selected>Implementation</option>
                    <option value="Transformation">Transformation</option>
                </select>

                <div class="grid-2">
                    <div>
                        <label for="input-waktu">Estimasi Waktu</label>
                        <input type="text" id="input-waktu" placeholder="Cth: 3 Bulan..." />
                    </div>
                    <div>
                        <label for="select-biaya">Estimasi Biaya</label>
                        <select id="select-biaya"></select>
                    </div>
                </div>

                <label for="input-framework">Potensi Framework</label>
                <input type="text" id="input-framework" list="framework-options" placeholder="Cth: ISO 27001, SPBE..." />
                <datalist id="framework-options"></datalist>
            </div>
            
            <button type="button" id="btn-review" disabled>Lanjut Tinjau Data</button>
            <button type="button" id="btn-refresh" class="secondary" style="font-size:0.9rem; padding:10px;">🔄 Refresh Database</button>
        </div>

        <div id="step-review" class="hidden">
            <h2>Konfirmasi Detail</h2>
            <p class="sub">Validasi data Discovery sebelum menyusun proposal.</p>
            <div class="review-box" id="review-text"></div>
            <div style="display:flex; gap:15px;">
                <button type="button" id="btn-back" class="secondary" style="width:35%">Kembali</button>
                <button type="button" id="btn-generate" style="width:65%">Generate Proposal <span id="spinner" class="spinner"></span></button>
            </div>
        </div>

        <div id="step-success" class="hidden" style="text-align:center; padding: 20px;">
            <div style="font-size: 60px; margin-bottom: 20px;">✅</div>
            <h2>Selesai!</h2>
            <p class="sub">Dokumen telah berhasil disusun dan diunduh.</p>
            <button type="button" onclick="location.reload()" class="secondary">Buat Proposal Baru</button>
        </div>
    </div>

    <script>
        let databaseStructure = {}; 
        let smartLibrary = {}; 
        
        const ui = {
            loader: document.getElementById('loader'),
            loaderText: document.getElementById('loader-text'),
            configStep: document.getElementById('step-config'),
            reviewStep: document.getElementById('step-review'),
            successStep: document.getElementById('step-success'),
            
            selPerusahaan: document.getElementById('select-perusahaan'),
            selProposal: document.getElementById('select-proposal'),
            selKonteks: document.getElementById('select-konteks'),
            selPermasalahan: document.getElementById('select-permasalahan'),
            selKebutuhan: document.getElementById('select-kebutuhan'),
            inpWaktu: document.getElementById('input-waktu'),
            selBiaya: document.getElementById('select-biaya'),
            inpFramework: document.getElementById('input-framework'),
            
            containerDynamic: document.getElementById('container-dynamic'),
            reviewText: document.getElementById('review-text'),
            
            btnReview: document.getElementById('btn-review'),
            btnGenerate: document.getElementById('btn-generate'),
            btnRefresh: document.getElementById('btn-refresh'),
            btnBack: document.getElementById('btn-back'),
            spinner: document.getElementById('spinner')
        };
        
        function loadConfig() {
            fetch('/get-config')
                .then(response => {
                    if (!response.ok) throw new Error("Database Load Failed.");
                    return response.json();
                })
                .then(data => {
                    if (data.error) throw new Error(data.error);
                    
                    databaseStructure = data.structure; 
                    smartLibrary = data.suggestions; 
                    
                    ui.selPerusahaan.innerHTML = '<option value="" disabled selected>Pilih Perusahaan...</option>';
                    Object.keys(databaseStructure).forEach(company => { 
                        ui.selPerusahaan.add(new Option(company, company)); 
                    });
                    
                    ui.loader.classList.add('hidden'); 
                    ui.configStep.classList.remove('hidden');
                })
                .catch(err => {
                    ui.loaderText.innerHTML = `<span class="error-text">${err.message}</span>`;
                });
        }
        
        loadConfig();

        ui.btnRefresh.onclick = () => {
            ui.btnRefresh.innerText = "Refreshing..."; ui.btnRefresh.disabled = true;
            fetch('/refresh-knowledge', {method: 'POST'})
                .then(response => response.json())
                .then(res => { alert("Database Synced!"); location.reload(); })
                .catch(err => { ui.btnRefresh.innerText = "🔄 Refresh Database"; ui.btnRefresh.disabled = false; });
        };

        // Populates the options based on SMART_SUGGESTIONS logic
        function updateIntelligentSuggestions() {
            const combinedContext = (ui.selPerusahaan.value + " " + ui.selKonteks.value).toLowerCase();
            let matchedRegs = new Set();

            if(smartLibrary) {
                Object.values(smartLibrary).forEach(category => {
                    if (category.keywords && category.keywords.some(kw => combinedContext.includes(kw))) {
                        category.regulations.forEach(r => matchedRegs.add(r));
                    }
                });
            }

            // Fallback defaults
            if (matchedRegs.size === 0) {
                ["ISO 9001", "ISO 27001", "UU PDP"].forEach(r => matchedRegs.add(r));
            }

            const regDatalist = document.getElementById('framework-options');
            regDatalist.innerHTML = '';
            matchedRegs.forEach(reg => {
                let opt = document.createElement('option');
                opt.value = reg;
                regDatalist.appendChild(opt);
            });
        }

        ui.selPerusahaan.onchange = () => {
            const company = ui.selPerusahaan.value;
            const data = databaseStructure[company];
            
            const populateSelect = (element, items, placeholder) => {
                element.innerHTML = `<option value="" disabled selected>${placeholder}</option>`;
                items.forEach(item => element.add(new Option(item, item)));
            };

            populateSelect(ui.selKonteks, data.konteks, "Pilih Konteks...");
            populateSelect(ui.selPermasalahan, data.permasalahan, "Pilih Permasalahan...");
            populateSelect(ui.selBiaya, data.biaya, "Pilih Estimasi Biaya...");
            
            ui.containerDynamic.classList.remove('hidden');
            updateIntelligentSuggestions();
            checkReviewReady();
        };

        [ui.selProposal, ui.selKonteks, ui.selPermasalahan, ui.selBiaya, ui.inpWaktu].forEach(el => {
            el.addEventListener('input', () => {
                if (el === ui.selKonteks) updateIntelligentSuggestions();
                checkReviewReady();
            });
        });

        function checkReviewReady() {
            const isReady = ui.selPerusahaan.value && ui.selProposal.value && ui.selKonteks.value && ui.selPermasalahan.value && ui.selBiaya.value && ui.inpWaktu.value.trim();
            ui.btnReview.disabled = !isReady;
        }

        ui.btnReview.onclick = () => { 
            ui.reviewText.innerHTML = `
                <div class="review-row"><span>Perusahaan</span><span>${ui.selPerusahaan.value}</span></div>
                <div class="review-row"><span>Jenis Proposal</span><span>${ui.selProposal.value}</span></div>
                <div class="review-row"><span>Konteks Organisasi</span><span>${ui.selKonteks.value}</span></div>
                <div class="review-row"><span>Permasalahan</span><span>${ui.selPermasalahan.value}</span></div>
                <div class="review-row"><span>Kebutuhan</span><span>${ui.selKebutuhan.value}</span></div>
                <div class="review-row"><span>Estimasi Waktu</span><span>${ui.inpWaktu.value}</span></div>
                <div class="review-row"><span>Estimasi Biaya</span><span>${ui.selBiaya.value}</span></div>
                <div class="review-row"><span>Framework</span><span>${ui.inpFramework.value || '-'}</span></div>
            `;
            ui.configStep.classList.add('hidden'); 
            ui.reviewStep.classList.remove('hidden'); 
        };

        ui.btnBack.onclick = () => { 
            ui.reviewStep.classList.add('hidden'); 
            ui.configStep.classList.remove('hidden'); 
        };

        ui.btnGenerate.onclick = () => {
            ui.btnGenerate.disabled = true; 
            ui.spinner.classList.add('active');
            
            const payload = {
                nama_perusahaan: ui.selPerusahaan.value,
                jenis_proposal: ui.selProposal.value,
                konteks_organisasi: ui.selKonteks.value,
                permasalahan: ui.selPermasalahan.value,
                klasifikasi_kebutuhan: ui.selKebutuhan.value,
                estimasi_waktu: ui.inpWaktu.value,
                estimasi_biaya: ui.selBiaya.value,
                potensi_framework: ui.inpFramework.value
            };

            fetch('/generate', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(payload) 
            })
            .then(response => {
                if (!response.ok) throw new Error("Document generation failed.");
                return response.blob();
            })
            .then(blob => {
                let url = window.URL.createObjectURL(blob);
                let a = document.createElement('a'); 
                a.href = url; 
                a.download = `Proposal_${ui.selPerusahaan.value.replace(/\\s+/g, '_')}.docx`; 
                a.click();
                
                window.URL.revokeObjectURL(url);
                ui.reviewStep.classList.add('hidden'); 
                ui.successStep.classList.remove('hidden');
            })
            .catch(err => {
                alert("Failed to generate document. Check server logs.");
                ui.btnGenerate.disabled = false;
                ui.spinner.classList.remove('active');
            });
        };
    </script>
</body>
</html>
